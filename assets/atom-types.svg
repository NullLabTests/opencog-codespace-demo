<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <rect width="500" height="400" fill="#f8f9fa" rx="8"/>
  <text x="250" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Atom Type Hierarchy</text>

  <!-- Atom root -->
  <rect x="175" y="50" width="150" height="30" rx="6" fill="#6c757d" stroke="#495057" stroke-width="1.5"/>
  <text x="250" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Atom</text>

  <!-- Node -->
  <line x1="200" y1="80" x2="100" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="25" y="120" width="150" height="30" rx="6" fill="#28a745" stroke="#1e7e34" stroke-width="1.5"/>
  <text x="100" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Node</text>

  <!-- Link -->
  <line x1="300" y1="80" x2="370" y2="120" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="300" y="120" width="150" height="30" rx="6" fill="#dc3545" stroke="#bd2130" stroke-width="1.5"/>
  <text x="375" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Link</text>

  <!-- Node subtypes -->
  <line x1="50" y1="150" x2="50" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="150" x2="100" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="150" y1="150" x2="150" y2="180" stroke="#666" stroke-width="1"/>

  <rect x="10" y="180" width="80" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="50" y="196" text-anchor="middle" font-size="9" fill="#155724">Concept</text>

  <rect x="95" y="180" width="90" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="140" y="196" text-anchor="middle" font-size="9" fill="#155724">Predicate</text>

  <rect x="190" y="180" width="80" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="230" y="196" text-anchor="middle" font-size="9" fill="#155724">Variable</text>

  <!-- More node subtypes -->
  <rect x="10" y="210" width="80" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="50" y="226" text-anchor="middle" font-size="9" fill="#155724">Number</text>

  <rect x="95" y="210" width="80" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="135" y="226" text-anchor="middle" font-size="9" fill="#155724">Type</text>

  <rect x="180" y="210" width="90" height="24" rx="4" fill="#c3e6cb" stroke="#28a745" stroke-width="1"/>
  <text x="225" y="226" text-anchor="middle" font-size="9" fill="#155724">Schema</text>

  <!-- Link subtypes -->
  <line x1="325" y1="150" x2="325" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="375" y1="150" x2="375" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="425" y1="150" x2="425" y2="180" stroke="#666" stroke-width="1"/>

  <rect x="290" y="180" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="196" text-anchor="middle" font-size="9" fill="#721c24">Inheritance</text>

  <rect x="290" y="208" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="224" text-anchor="middle" font-size="9" fill="#721c24">Evaluation</text>

  <rect x="290" y="236" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="252" text-anchor="middle" font-size="9" fill="#721c24">Get / Bind</text>

  <!-- More link subtypes -->
  <rect x="290" y="264" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="280" text-anchor="middle" font-size="9" fill="#721c24">And / Or / Not</text>

  <rect x="290" y="292" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="308" text-anchor="middle" font-size="9" fill="#721c24">Plus / Times</text>

  <rect x="290" y="320" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="336" text-anchor="middle" font-size="9" fill="#721c24">Similarity</text>

  <rect x="290" y="348" width="100" height="24" rx="4" fill="#f5c6cb" stroke="#dc3545" stroke-width="1"/>
  <text x="340" y="364" text-anchor="middle" font-size="9" fill="#721c24">AtTime</text>

  <!-- Legend -->
  <rect x="30" y="260" width="200" height="60" rx="4" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <rect x="40" y="270" width="12" height="12" rx="2" fill="#28a745"/>
  <text x="56" y="280" font-size="9" fill="#333">Node — named entity (no children)</text>
  <rect x="40" y="290" width="12" height="12" rx="2" fill="#dc3545"/>
  <text x="56" y="300" font-size="9" fill="#333">Link — connects atoms (has children)</text>
  <text x="100" y="350" font-size="9" fill="#999">60+ built-in types (subset shown)</text>
</svg>
