<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">OpenCog Classic Architecture</text>

  <!-- Layer 1: User Access -->
  <rect x="50" y="60" width="700" height="60" rx="6" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90d9">User Access Layer</text>
  <text x="130" y="105" text-anchor="middle" font-size="11" fill="#333">Telnet (17001)</text>
  <text x="320" y="105" text-anchor="middle" font-size="11" fill="#333">WebSocket Shell (18080/json)</text>
  <text x="540" y="105" text-anchor="middle" font-size="11" fill="#333">HTTP REST (18080/stats)</text>
  <text x="700" y="105" text-anchor="middle" font-size="11" fill="#333">MCP (18888)</text>

  <!-- Arrow -->
  <line x1="400" y1="120" x2="400" y2="155" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: CogServer -->
  <rect x="150" y="160" width="500" height="60" rx="6" fill="#fff3cd" stroke="#e6a817" stroke-width="2"/>
  <text x="400" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">CogServer</text>
  <text x="400" y="205" text-anchor="middle" font-size="11" fill="#856404">Scheme / Python / JSON Shells · Connection Manager · Module Loader</text>

  <!-- Arrow -->
  <line x1="400" y1="220" x2="400" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: AtomSpace -->
  <rect x="100" y="260" width="600" height="70" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="400" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">AtomSpace Core</text>
  <text x="400" y="305" text-anchor="middle" font-size="11" fill="#155724">Type Index · Incoming/Outgoing Sets · Pattern Matcher · Query Engine · Value Store</text>
  <text x="400" y="320" text-anchor="middle" font-size="10" fill="#155724">~500K atoms/s · 80-120 bytes/atom · 60+ built-in types</text>

  <!-- Arrows to storage -->
  <line x1="200" y1="330" x2="200" y2="495" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="330" x2="400" y2="495" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="330" x2="600" y2="495" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Storage Backends -->
  <rect x="50" y="440" width="200" height="50" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="150" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">RocksDB Storage</text>
  <text x="150" y="478" text-anchor="middle" font-size="10" fill="#721c24">Local persistence</text>

  <rect x="300" y="440" width="200" height="50" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="400" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">PostgreSQL</text>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="#721c24">Network persistence</text>

  <rect x="550" y="440" width="200" height="50" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="650" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">In-Memory</text>
  <text x="650" y="478" text-anchor="middle" font-size="10" fill="#721c24">Default (ephemeral)</text>

  <!-- Side: Visualizer -->
  <rect x="680" y="175" width="110" height="70" rx="6" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.5"/>
  <text x="735" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#6f42c1">Visualizer</text>
  <text x="735" y="212" text-anchor="middle" font-size="9" fill="#6f42c1">3D Graph</text>
  <text x="735" y="224" text-anchor="middle" font-size="9" fill="#6f42c1">Tree/Type Views</text>
  <text x="735" y="236" text-anchor="middle" font-size="9" fill="#6f42c1">Analytics</text>
  <line x1="680" y1="210" x2="650" y2="210" stroke="#6f42c1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <rect x="50" y="370" width="700" height="40" rx="4" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <rect x="65" y="380" width="16" height="16" rx="2" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1"/>
  <text x="85" y="393" font-size="10" fill="#333">Access</text>
  <rect x="145" y="380" width="16" height="16" rx="2" fill="#fff3cd" stroke="#e6a817" stroke-width="1"/>
  <text x="165" y="393" font-size="10" fill="#333">Server</text>
  <rect x="225" y="380" width="16" height="16" rx="2" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="245" y="393" font-size="10" fill="#333">Core</text>
  <rect x="300" y="380" width="16" height="16" rx="2" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="320" y="393" font-size="10" fill="#333">Storage</text>
  <rect x="395" y="380" width="16" height="16" rx="2" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1"/>
  <text x="415" y="393" font-size="10" fill="#333">Visualization</text>
</svg>
