<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="monospace">
  <rect width="500" height="300" fill="#f8f9fa" rx="8"/>
  <text x="250" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Network Topology</text>

  <!-- Browser -->
  <rect x="30" y="60" width="120" height="45" rx="6" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="90" y="78" text-anchor="middle" font-size="10" fill="#004085">Browser</text>
  <text x="90" y="93" text-anchor="middle" font-size="9" fill="#004085">Visualizer / Shell</text>

  <!-- Arrow -->
  <line x1="150" y1="82" x2="200" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="175" y="75" text-anchor="middle" font-size="8" fill="#666">WS :18080</text>

  <!-- CogServer -->
  <rect x="205" y="55" width="140" height="55" rx="6" fill="#fff3cd" stroke="#e6a817" stroke-width="2"/>
  <text x="275" y="78" text-anchor="middle" font-size="10" font-weight="bold" fill="#856404">CogServer</text>
  <text x="275" y="95" text-anchor="middle" font-size="8" fill="#856404">:18080 :17001 :18888</text>

  <!-- Telnet client -->
  <rect x="30" y="130" width="120" height="40" rx="4" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="90" y="155" text-anchor="middle" font-size="10" fill="#004085">Telnet Client</text>

  <line x1="150" y1="150" x2="205" y2="110" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="165" y="120" text-anchor="middle" font-size="8" fill="#666">TCP :17001</text>

  <!-- MCP client -->
  <rect x="30" y="190" width="120" height="40" rx="4" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="90" y="215" text-anchor="middle" font-size="10" fill="#004085">MCP Client</text>

  <line x1="150" y1="210" x2="205" y2="140" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="175" y="165" text-anchor="middle" font-size="8" fill="#666">MCP :18888</text>

  <!-- Storage -->
  <rect x="380" y="130" width="100" height="55" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="430" y="152" text-anchor="middle" font-size="10" fill="#721c24">Storage</text>
  <text x="430" y="168" text-anchor="middle" font-size="8" fill="#721c24">RocksDB / PG</text>

  <line x1="345" y1="140" x2="380" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="362" y="133" text-anchor="middle" font-size="8" fill="#666">Embedded</text>

  <!-- REST client -->
  <rect x="380" y="55" width="100" height="40" rx="4" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="430" y="80" text-anchor="middle" font-size="10" fill="#004085">curl / REST</text>

  <line x1="345" y1="80" x2="380" y2="75" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="362" y="68" text-anchor="middle" font-size="8" fill="#666">HTTP :18080</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>
