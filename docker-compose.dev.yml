services:
  cogserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencog-demo
    container_name: opencog-cogserver-dev
    ports:
      - "17001:17001"
      - "18080:18080"
      - "18888:18888"
    volumes:
      - ./demo:/usr/local/share/opencog/demo:ro
      - ./docs:/usr/local/share/opencog/docs:ro
      - ./assets:/usr/local/share/opencog/assets:ro
    restart: "no"
    environment:
      - COGSERVER_REPL_PORT=17001
      - COGSERVER_WEB_PORT=18080
      - COGSERVER_MCP_PORT=18888
      - COGSERVER_LOG_LEVEL=debug
    command: ["cogserver", "-p", "17001", "-w", "18080", "-m", "18888", "--log-level=debug"]

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencog-test-runner
    depends_on:
      cogserver:
        condition: service_healthy
    command: ["bash", "-c", "sleep 5 && /usr/local/bin/test-integration.sh"]
